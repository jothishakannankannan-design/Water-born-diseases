<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Community Health Monitoring System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>💧 Smart Community Health Monitoring System</h1>
<p>Early Warning System for Water-Borne Diseases</p>
</header>

<div class="container">

<h2>Enter Water Quality Details</h2>

<label>Village Name</label>
<input type="text" id="village" placeholder="Enter Village Name">

<label>Water Quality (%)</label>
<input type="number" id="water" placeholder="0-100">

<label>pH Value</label>
<input type="number" id="ph" step="0.1" placeholder="7.0">

<label>Turbidity (NTU)</label>
<input type="number" id="turbidity" placeholder="Enter Value">

<label>Population</label>
<input type="number" id="population" placeholder="Population">

<button onclick="checkRisk()">Submit</button>

<div class="result">
<h2>Result</h2>

<p><strong>Village:</strong>
<span id="villageResult">-</span></p>

<p><strong>Water Quality:</strong>
<span id="waterResult">-</span></p>

<p><strong>Disease Risk:</strong>
<span id="risk">-</span></p>

<p><strong>Recommendation:</strong></p>

<p id="advice"></p>

</div>

</div>

<script src="script.js"></script>

</body>
    </html>
